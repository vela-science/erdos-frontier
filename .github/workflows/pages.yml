name: Deploy audit to GitHub Pages

# Publishes the site/ directory (index.html + the verdicts.json feed + status.json
# + STATUS.md). Enable once in repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths: [site/**, .github/workflows/pages.yml]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000   # GitHub's Pages queue has been slow; default 10min aborts mid-queue
