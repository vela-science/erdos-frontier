name: Deploy audit to GitHub Pages

# Publishes index.html + verdicts.json (the public fidelity audit feed). Enable
# once in repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths: [index.html, verdicts.json, status.json]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage the public surface
        run: |
          mkdir -p _site
          cp index.html verdicts.json status.json STATUS.md _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
